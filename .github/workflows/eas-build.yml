name: EAS Build — Android

on:
  # Manual trigger — click "Run workflow" on GitHub Actions tab
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview
          - development

jobs:
  sentry-gate:
    name: Verify Sentry is configured
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sentry must be enabled
        run: |
          grep -q '"@sentry/react-native/expo"' app.json || { echo "::error::Sentry plugin disabled in app.json"; exit 1; }
          grep -q "initSentry" app/_layout.tsx || { echo "::error::initSentry() missing"; exit 1; }
          grep -q "EXPO_PUBLIC_SENTRY_DSN" .env || { echo "::error::Sentry DSN not set"; exit 1; }
          echo "✅ Sentry checks passed"

  build-android:
    name: Android (${{ github.event.inputs.profile }})
    needs: sentry-gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Android on EAS
        run: eas build --platform android --profile ${{ github.event.inputs.profile }} --non-interactive
